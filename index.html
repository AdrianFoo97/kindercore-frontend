<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KinderTech</title>
    <!-- Rounded/friendly sans-serif — Nunito loads as the primary
         font, with `ui-rounded` (Apple SF Pro Rounded) + system
         fallbacks so the teacher-facing pages always render in a
         curvy / soft typeface. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        height: 100%; margin: 0; padding: 0;
      }
      /* Apply the rounded type stack everywhere. The wildcard
         selector covers buttons / inputs / textareas which would
         otherwise inherit the OS chrome font, and the `body` rule
         supplies the cascade root. */
      html, body, button, input, textarea, select, * {
        font-family: 'Nunito', ui-rounded, -apple-system, 'SF Pro Rounded', 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      }
    </style>

      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];

</html>
